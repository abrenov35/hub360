<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>HUB 360</title>

<style>
:root{
--navy:#162D49;
--cream:#F3EAE2;
--lav:#A495C3;
--white:#fff;
--gray:#7b7b7b;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Arial,sans-serif;
background:var(--navy);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
background:var(--navy);
padding:14px 16px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.logo{
font-size:18px;
font-weight:700;
letter-spacing:-0.5px;
}

.logo span{
color:var(--lav);
}

.search{
width:130px;
padding:8px 10px;
border:none;
border-radius:8px;
outline:none;
background:rgba(255,255,255,.12);
color:white;
}

.search::placeholder{
color:rgba(255,255,255,.45);
}

.stage{
flex:1;
background:var(--cream);
border-radius:22px 22px 0 0;
overflow-y:auto;
padding:18px 14px 30px;
}

.group{
margin-bottom:28px;
}

.group-title{
font-size:11px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
margin-bottom:12px;
padding-bottom:6px;
border-bottom:1px solid rgba(0,0,0,.08);
color:var(--gray);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(78px,1fr));
gap:12px;
}

.tile{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
}

.tile a,
.tile a:visited,
.tile a:hover,
.tile a:active{
text-decoration:none;
color:inherit;
-webkit-tap-highlight-color:transparent;
}

.icon{
width:72px;
height:72px;
background:white;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
box-shadow:0 2px 10px rgba(0,0,0,.10);
transition:.2s;
}

.icon:active{
transform:scale(.92);
}

.name{
font-size:10px;
font-weight:600;
text-align:center;
color:var(--navy);
width:100%;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.bottom{
background:var(--cream);
padding:10px 14px;
border-top:1px solid rgba(0,0,0,.08);
display:flex;
gap:8px;
}

.btn{
flex:1;
border:none;
border-radius:10px;
padding:12px;
font-weight:700;
cursor:pointer;
}

.btn-main{
background:var(--navy);
color:white;
}

.btn-lite{
background:rgba(22,45,73,.08);
color:var(--navy);
}

@media(max-width:480px){
.grid{
grid-template-columns:repeat(4,1fr);
gap:10px 8px;
}
}
</style>
</head>

<body>

<header>
<div class="logo">HUB <span>360</span></div>
<input class="search" id="searchInput" placeholder="Rechercher"/>
</header>

<div class="stage">
<div id="content"></div>
</div>

<div class="bottom">
<button class="btn btn-lite" onclick="loadData()">Synchroniser</button>
<button class="btn btn-main" onclick="alert('Mode ajout à reconnecter si besoin')">Ajouter</button>
</div>

<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxprmK8bUeV4GaxxiI28L7I5bg7M0fYzhGvqR3c0j_5_f9YZr43V0KVdsvOFe3p4u3Q/exec';

const APP_VERSION = '2026-05-25-clean-rebuild-v1';

let sites = [];

function normalizeUrl(url){
url = String(url || '').trim();

if(!/^https?:\/\//i.test(url)){
url = 'https://' + url;
}

return url;
}

async function loadData(){

try{

const res = await fetch(
SCRIPT_URL + '?action=get&t=' + Date.now(),
{
cache:'no-store'
}
);

const data = await res.json();

sites = Array.isArray(data.sites)
? data.sites
: [];

localStorage.setItem(
'hub360_sites',
JSON.stringify(sites)
);

render();

}catch(err){

console.error(err);

try{
sites = JSON.parse(
localStorage.getItem('hub360_sites')
) || [];
}catch(e){
sites = [];
}

render();

}

}

function render(){

const q = document
.getElementById('searchInput')
.value
.toLowerCase()
.trim();

let filtered = [...sites];

if(q){

filtered = filtered.filter(s =>
String(s.name || '').toLowerCase().includes(q) ||
String(s.group || '').toLowerCase().includes(q)
);

}

filtered.sort((a,b)=>
String(a.group || 'Divers').localeCompare(String(b.group || 'Divers'),'fr')
||
String(a.name || '').localeCompare(String(b.name || ''),'fr')
);

const groups = [...new Set(
filtered.map(s => s.group || 'Divers')
)].sort((a,b)=>a.localeCompare(b,'fr'));

const html = groups.map(group => {

const items = filtered.filter(
s => (s.group || 'Divers') === group
);

return `
<div class="group">

<div class="group-title">
${group}
</div>

<div class="grid">

${items.map(site => `

<div class="tile">

<a
href="${normalizeUrl(site.url)}"
target="_blank"
rel="noopener noreferrer"
>

<div class="icon">
🌐
</div>

<div class="name">
${site.name || 'Sans nom'}
</div>

</a>

</div>

`).join('')}

</div>

</div>
`;

}).join('');

document.getElementById('content').innerHTML =
html || '<p>Aucune application</p>';

}

document
.getElementById('searchInput')
.addEventListener('input', render);

if(localStorage.getItem('hub360_version') !== APP_VERSION){

localStorage.removeItem('hub360_sites');

localStorage.setItem(
'hub360_version',
APP_VERSION
);

}

loadData();

</script>

</body>
</html>
